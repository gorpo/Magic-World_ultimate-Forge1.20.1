    bundledClientMods.each { bundledMod ->
        localRuntime files(bundledMod.file)
    }
}

tasks.register('generateAllInOneJarJarMetadata') {
    group = 'build'
    description = 'Generates NeoForge Jar-in-Jar metadata for the Magic World all-in-one client mod.'

    def metadataFile = layout.buildDirectory.file('generated/magicworldAllInOne/META-INF/jarjar/metadata.json')

    outputs.file(metadataFile)

    doLast {
        def outputFile = metadataFile.get().asFile
        outputFile.parentFile.mkdirs()

        def metadata = [
                jars: bundledClientMods.collect { bundledMod ->
                    [
                            identifier : [
                                    group   : bundledMod.group,
                                    artifact: bundledMod.artifact
                            ],
                            version    : [
                                    range          : "[${bundledMod.version},)",
                                    artifactVersion: bundledMod.version
                            ],
                            path       : "META-INF/jarjar/${bundledMod.file.name}",
                            isObfuscated: false
                    ]
                }
        ]

        outputFile.text = groovy.json.JsonOutput.prettyPrint(
                groovy.json.JsonOutput.toJson(metadata)
        )
    }
}

tasks.register('magicWorldAllInOneJar', Jar) {
    group = 'build'
    description = 'Builds Magic World as one client mod JAR with bundled client, performance, map and building mods embedded.'

    dependsOn tasks.named('jar'), tasks.named('generateAllInOneJarJarMetadata')

    archiveBaseName = "MagicWorld-Ultimate-NeoForge-${minecraft_version}"
    archiveVersion = mod_version
    archiveClassifier = 'all-in-one'
    duplicatesStrategy = DuplicatesStrategy.EXCLUDE

    from({ zipTree(tasks.named('jar').get().archiveFile.get().asFile) })

    from(bundledClientMods.collect { it.file }) {
        into 'META-INF/jarjar'
    }

    from(layout.buildDirectory.dir('generated/magicworldAllInOne'))

    doFirst {
        bundledClientMods.each { bundledMod ->
            if (!bundledMod.file.isFile()) {
                throw new GradleException("Missing bundled client mod: ${bundledMod.file}. Put the required mod jar in the configured path before building magicWorldAllInOneJar.")
            }
        }
    }
}

// This block of code expands all declared replace properties in the specified resource targets.
// A missing property will result in an error. Properties are expanded using ${} Groovy notation.
var generateModMetadata = tasks.register("generateModMetadata", ProcessResources) {
    var replaceProperties = [
            minecraft_version      : minecraft_version,
            minecraft_version_range: minecraft_version_range,
            neo_version            : neo_version,
            mod_id                 : mod_id,
            mod_name               : mod_name,
            mod_license            : mod_license,
            mod_version            : mod_version,
    ]
    inputs.properties replaceProperties
    expand replaceProperties
    from "src/main/templates"
    into "build/generated/sources/modMetadata"
}
// Include the output of "generateModMetadata" as an input directory for the build
// this works with both building through Gradle and the IDE.
sourceSets.main.resources.srcDir generateModMetadata
// To avoid having to run "generateModMetadata" manually, make it run on every project reload
neoForge.ideSyncTask generateModMetadata

// Example configuration to allow publishing using the maven-publish plugin
publishing {
    publications {
        register('mavenJava', MavenPublication) {
            from components.java
        }
    }
    repositories {
        maven {
            url "file://${project.projectDir}/repo"
        }
    }
}

tasks.withType(JavaCompile).configureEach {
    options.encoding = 'UTF-8' // Use the UTF-8 charset for Java compilation
}

// IDEA no longer automatically downloads sources/javadoc jars for dependencies, so we need to explicitly enable the behavior.
idea {
    module {
        downloadSources = true
        downloadJavadoc = true
    }
}
